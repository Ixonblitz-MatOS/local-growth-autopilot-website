databases:
  - name: gavell-intelligence-db
    databaseName: gavell_intelligence
    user: gavell_intelligence_user

services:
  - type: web
    name: gavell-intelligence-api
    env: python
    rootDir: docs/backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: gavell-intelligence-db
          property: connectionString
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: gavell-intelligence
    env: static
    rootDir: docs
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
